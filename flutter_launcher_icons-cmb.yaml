# Launcher icons for the CMB flavor.
# Detected automatically by flutter_launcher_icons (filename pattern
# flutter_launcher_icons-<flavor>.yaml) and generated into
# android/app/src/cmb/res/.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/cmb_icon_square.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0D1B3E"
  adaptive_icon_foreground: "assets/images/cmb_icon_square.png"
